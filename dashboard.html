<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>DineBook | Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="dashboard-section py-5">
      <div class="container">
        <div class="d-flex justify-content-end mb-4">
          <button class="btn btn-danger" id="logoutBtn">
            <i class="bi bi-box-arrow-right"></i>

            Logout
          </button>
        </div>

        <div class="text-center mb-3">
          <div class="logo-icon">
            <i class="bi bi-cup-hot-fill"></i>
          </div>

          <h1 class="logo">Dine<span>Book</span></h1>

          <p class="logo-text">TABLE BOOKING SYSTEM</p>
        </div>

        <!-- Heading -->

        <div class="text-center mb-5">
          <h2 class="dashboard-title">Restaurant <span>Dashboard</span></h2>

          <p class="dashboard-subtitle">
            Choose an available table and complete your booking.
          </p>
        </div>
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="dashboard-card">
              <h3 class="card-title">
                <i class="bi bi-calendar2-check-fill"></i>

                Booking Details
              </h3>

              <form id="bookingForm">
                <div class="mb-3">
                  <label class="form-label"> Customer Name </label>

                  <input
                    type="text"
                    class="form-control"
                    id="customerName"
                    placeholder="Enter customer name"
                  />

                  <small id="nameError"></small>
                </div>

                <div class="mb-3">
                  <label class="form-label"> Phone Number </label>

                  <input
                    type="tel"
                    class="form-control"
                    id="customerPhone"
                    placeholder="Enter phone number"
                  />

                  <small id="phoneError"></small>
                </div>

                <div class="mb-3">
                  <label class="form-label"> Booking Date </label>

                  <input type="date" class="form-control" id="bookingDate" />
                </div>

                <div class="mb-3">
                  <label class="form-label"> Booking Time </label>

                  <input type="time" class="form-control" id="bookingTime" />
                </div>

                <div class="mb-4">
                  <label class="form-label"> Guests </label>

                  <select class="form-select" id="guests">
                    <option value="">Select Guests</option>

                    <option value="1">1 Guest</option>

                    <option value="2">2 Guests</option>

                    <option value="3">3 Guests</option>

                    <option value="4">4 Guests</option>

                    <option value="5">5 Guests</option>

                    <option value="6">6 Guests</option>
                  </select>
                </div>
              </form>
            </div>
          </div>

          <div class="col-lg-8">
            <div class="dashboard-card">
              <div
                class="d-flex justify-content-between align-items-center mb-4"
              >
                <h3 class="card-title m-0">
                  <i class="bi bi-grid-fill"></i>

                  Restaurant Tables
                </h3>

                <div>
                  <span class="badge bg-success"> Available </span>

                  <span class="badge bg-warning text-dark ms-2">
                    Selected
                  </span>

                  <span class="badge bg-danger ms-2"> Booked </span>
                </div>
              </div>

              <!-- JavaScript creates tables here -->

              <div class="row g-3" id="tableContainer"></div>

              <hr class="my-4" />

              <div class="summary-box">
                <div class="row text-center">
                  <div class="col-md-3">
                    <h6>Table</h6>

                    <p id="selectedTable">-</p>
                  </div>

                  <div class="col-md-3">
                    <h6>Date</h6>

                    <p id="summaryDate">-</p>
                  </div>

                  <div class="col-md-3">
                    <h6>Time</h6>

                    <p id="summaryTime">-</p>
                  </div>

                  <div class="col-md-3">
                    <h6>Guests</h6>

                    <p id="summaryGuests">-</p>
                  </div>
                </div>
              </div>

              <div class="d-flex justify-content-end gap-3 mt-4">
                <button type="button" class="auth-btn" id="actionBtn">
                  <i class="bi bi-check-circle-fill"></i>

                  Confirm Booking
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="dashboard.js"></script>
  </body>
</html>
